<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mise à jour automatique des liens</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <!-- Base de données -->
    <script src="js/db.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #fff; padding: 40px; }
        button { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:hover { background: #2563eb; }
        button:disabled { background: #64748b; cursor: not-allowed; }
        #log { background: #1e293b; padding: 20px; border-radius: 8px; margin-top: 20px; font-family: monospace; white-space: pre-wrap; line-height: 1.5; color: #a7f3d0; }
        .success { color: #34d399; }
        .error { color: #f87171; }
        .warning { color: #fbbf24; }
    </style>
</head>
<body>
    <h1>Mise à jour automatique des liens des fournisseurs</h1>
    <p>Cette page va analyser votre base de données et ajouter automatiquement les liens extraits de l'image pour les fournisseurs correspondants.</p>
    
    <button id="start-btn" onclick="runUpdate()">Lancer la mise à jour</button>
    
    <div id="log">En attente du lancement...</div>

    <script>
        const linkData = [
            { match: "Blue Carbon", link: "https://bluecarbon.solar" },
            { match: "TTNergy", link: "https://www.ttnergy.com" },
            { match: "TAILG", link: "https://www.tailg.com" },
            { match: "MARSTEK", link: "https://www.marstekenergy.com" },
            { match: "UNI-T", link: "https://www.uni-trend.com" },
            { match: "RPT", link: "https://www.rpt-battery.com" },
            { match: "ISUZU", link: "https://isuzucommercial.com" },
            { match: "LINTEST", link: "https://www.lintest.com.cn" },
            { match: "BIOSLED", link: "https://www.biosled.net" },
            { match: "LOY", link: "" },
            { match: "KSENG", link: "https://www.xmkseng.com" },
            { match: "Honguest", link: "https://www.honguest.com" },
            { match: "Sungold", link: "https://www.sungoldsolar.com" },
            { match: "KingFeels", link: "https://www.kingfeels.com" }
        ];

        function log(msg, type = '') {
            const logDiv = document.getElementById('log');
            if(logDiv.innerText === 'En attente du lancement...') logDiv.innerText = '';
            
            const p = document.createElement('div');
            p.innerText = msg;
            if(type) p.className = type;
            logDiv.appendChild(p);
            console.log(msg);
        }

        async function runUpdate() {
            document.getElementById('start-btn').disabled = true;
            log("Chargement de la base de données...");
            
            let attempts = 0;
            while (!localDB._isLoaded && attempts < 20) {
                await new Promise(r => setTimeout(r, 500));
                attempts++;
            }

            if (!localDB._isLoaded) {
                log("Erreur : Impossible de charger la base de données. Êtes-vous bien connecté à internet ?", "error");
                return;
            }

            log(`Base de données chargée. ${localDB.suppliers.length} fournisseurs trouvés.`, "success");
            log("Démarrage de la mise à jour...\n");

            let updatedCount = 0;

            for (const sup of localDB.suppliers) {
                const nameUpper = sup.name.toUpperCase();
                
                const matchedData = linkData.find(d => nameUpper.includes(d.match.toUpperCase()));
                
                if (matchedData && matchedData.link !== "") {
                    log(`🔍 Correspondance trouvée : ${sup.name}`);
                    log(`   -> Application du lien : ${matchedData.link}`);
                    
                    sup.link = matchedData.link;
                    
                    try {
                        await saveDoc('suppliers', sup);
                        log("   ✅ Sauvegardé avec succès dans Firebase.", "success");
                        updatedCount++;
                    } catch(e) {
                        log(`   ❌ Erreur de sauvegarde : ${e.message}`, "error");
                    }
                } else if (matchedData && matchedData.link === "") {
                    log(`⚠️ Ignoré : ${sup.name} (Aucun lien visible sur l'image)`, "warning");
                }
            }

            log(`\n🎉 Opération terminée ! ${updatedCount} fournisseurs mis à jour.`, "success");
            log("Vous pouvez maintenant fermer cette page et retourner sur votre espace administrateur.");
        }
    </script>
</body>
</html>
